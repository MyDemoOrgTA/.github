name: Load POC Vault Secrets

on:
  workflow_call:

jobs:
  load-secrets:
    name: Load secrets from 1Password (Test vault)
    runs-on: ubuntu-latest
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@7ce42673ba9ed69053d678faeba29ea36bd25755  # v4.0.0
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          DB_USERNAME: op://Test/DB_PASS/username
          DB_PASSWORD: op://Test/DB_PASS/password
        with:
          export-env: true

      - name: Validate secrets
        run: |
          [ -n "$DB_USERNAME" ] && echo "✅ DB_USERNAME set" || { echo "❌ DB_USERNAME missing"; exit 1; }
          [ -n "$DB_PASSWORD" ] && echo "✅ DB_PASSWORD set" || { echo "❌ DB_PASSWORD missing"; exit 1; }
